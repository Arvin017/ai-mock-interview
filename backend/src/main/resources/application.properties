# Server
server.port=${PORT:8080}

# H2 Database (development)
#spring.datasource.url=jdbc:h2:mem:interviewdb
spring.datasource.url=jdbc:h2:file:./data/interviewdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Mock AI Mode (FREE - no API key needed) ──────────────
# The app uses a built-in mock AI engine — no external calls!
# To use a real API later, swap AiService.java with the real version.
anthropic.api.key=mock-mode
anthropic.api.url=http://localhost/mock
anthropic.model=mock

# CORS
cors.allowed.origins=https://ai-mock-interview-five-iota.vercel.app

# Logging
logging.level.com.interview=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
